        :root {
            --hn-orange: #ff6600;
            --hn-orange-dark: #cc5200;
            --bg-color: #f6f6ef;
            --text-color: #828282;
            --link-color: #000000;
            --visited-color: #828282;
            --border-color: #e0e0e0;
            --highlight-bg: #fff7e6;
            --summary-bg: #f0f4f8;

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            background-color: var(--hn-orange);
            padding: 2px 8px;
            border-bottom: 1px solid var(--hn-orange-dark);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 4px 0;
        }

        .logo {
            font-family: var(--code-font);
            font-size: 18px;
            font-weight: 700;
            color: #000;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #fff;
        }

        .tagline {
            font-size: 12px;
            color: #000;
            opacity: 0.8;
            font-family: var(--code-font);
        }

        nav {
            margin-left: auto;
            display: flex;
            gap: 12px;
        }

        nav a {
            color: #000;
            text-decoration: none;
            font-size: 13px;
            font-family: var(--code-font);
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        nav a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Main Content */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 8px;
        }

        .news-list {
            list-style: none;
        }

        .news-item {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.2s;
        }

        .news-item:hover {
            background-color: var(--highlight-bg);
        }

        .rank {
            font-family: var(--code-font);
            font-size: 13px;
            color: var(--text-color);
            min-width: 30px;
            text-align: right;
            padding-top: 2px;
        }

        .arrow {
            color: var(--hn-orange);
            font-size: 10px;
            padding-top: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .arrow:hover {
            transform: scale(1.2);
        }

        .content {
            flex: 1;
        }

        .title {
            font-size: 14px;
            line-height: 1.4;
        }

        .title a {
            color: var(--link-color);
            text-decoration: none;
        }

        .title a:hover {
            text-decoration: underline;
        }

        .title a:visited {
            color: var(--visited-color);
        }

        .site {
            font-size: 11px;
            color: var(--text-color);
            font-family: var(--code-font);
        }

        .site a {
            color: var(--text-color);
            text-decoration: none;
        }

        .site a:hover {
            text-decoration: underline;
        }

        .meta {
            font-size: 11px;
            color: var(--text-color);
            margin-top: 4px;
            font-family: var(--code-font);
        }

        .meta a {
            color: var(--text-color);
            text-decoration: none;
        }

            text-decoration: underline;
        }

        .ai-summary-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #ff6600 0%, #ff8533 100%);
            color: #fff;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;

            font-family: var(--code-font);

            margin-left: 10px;

        }

        .ai-summary-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(255, 102, 0, 0.3);
        }

        .ai-summary-btn .sparkle {
            font-size: 13px;
        }

        .ai-summary-panel {
            display: none;
            background: #fff;
            border-left: 4px solid var(--hn-orange);
            padding: 16px 20px;
            margin: 10px 0 10px 42px;
            border-radius: 0 6px 6px 0;

            line-height: 1.7;
            color: #1a1a1a;

        }

        .ai-summary-panel.visible {
            display: block;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

            font-family: var(--body-font);
            color: #2a2a2a;
            font-weight: 400;
        }

        .ai-summary-panel .summary-content p {
            margin: 0;
            text-align: justify;
        }

        .ai-summary-panel .tags {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

            background: linear-gradient(135deg, rgba(255, 102, 0, 0.1) 0%, rgba(255, 133, 51, 0.1) 100%);
            color: var(--hn-orange);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: var(--code-font);
            font-weight: 600;
            border: 1px solid rgba(255, 102, 0, 0.2);
            font-size: 10px;
            font-family: var(--code-font);
        }

        /* Footer */
        .more-link {
            display: block;
            text-align: center;
            padding: 20px;
            color: var(--hn-orange);
            text-decoration: none;
            font-family: var(--code-font);
            font-size: 13px;
            border-top: 2px solid var(--hn-orange);
            margin-top: 20px;
            background: #fff;
        }

        .more-link:hover {
            background: var(--highlight-bg);
        }

        /* Footer Branding */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 11px;
            color: var(--text-color);
            font-family: var(--code-font);
        }

        .deerflow-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--hn-orange);
            text-decoration: none;
            padding: 4px 8px;
            border-radius: 3px;
            transition: background-color 0.2s;
            font-size: 11px;
        }

        .deerflow-badge:hover {
            background-color: rgba(255, 102, 0, 0.1);
        }

            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-content {
                flex-wrap: wrap;
                gap: 8px;
            }

                width: 100%;
                justify-content: center;
                margin-top: 4px;
            }

            .ai-summary-panel {
                margin-left: 0;
            }
        }
