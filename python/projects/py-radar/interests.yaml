# DB Radar Personalization Configuration
#
# This file configures personalized ranking for your daily DB/OLAP briefing.
# Product priorities multiply against the content-type score in Ranker.
# Keyword weights replace the default HIGH_VALUE_KEYWORDS when this section is present.
#
# Product matching uses item.title and item.domain only (not content) to avoid
# false positives from comparative articles mentioning multiple products.
# "First match wins" based on YAML insertion order for predictability.
#
# When keywords section is present and non-empty, it replaces the default
# HIGH_VALUE_KEYWORDS. When absent or empty, falls back to default behavior.

# Product priorities: weight multiplied against content-type score
# Higher values = stronger preference. Products matched by title/domain presence.
products:
  DuckDB: 2.0
  Iceberg: 1.8
  Trino: 1.5
  ClickHouse: 1.3
  StarRocks: 1.2

# Keyword boosts: each match contributes score += 0.05 * weight
# Replace default keywords when this section is non-empty
keywords:
  lakehouse: 1.6
  REST catalog: 1.6
  materialized view: 1.4
  vectorized: 1.3
  columnar: 1.2
  parquet: 1.2
  optimizer: 1.1
  partition: 1.0