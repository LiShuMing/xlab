id: clickhouse
name: ClickHouse
category: open_source
homepage: https://clickhouse.com/
description: "Column-oriented database management system for real-time analytics"

sources:
  - type: github_releases
    url: https://api.github.com/repos/ClickHouse/ClickHouse/releases
    priority: 100

analysis:
  audience:
    - data_engineer
    - database_engineer
    - product_manager
  competitor_set:
    - starrocks
    - doris
    - duckdb
  prompt_profile: database_olap

version_rules:
  strategy: semver_loose
