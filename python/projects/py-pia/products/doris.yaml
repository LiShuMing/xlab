id: doris
name: Apache Doris
category: open_source
homepage: https://doris.apache.org/
description: "Real-time analytical database based on MPP architecture"

sources:
  - type: github_releases
    url: https://api.github.com/repos/apache/doris/releases
    priority: 100

analysis:
  audience:
    - data_engineer
    - database_engineer
    - product_manager
  competitor_set:
    - starrocks
    - clickhouse
    - trino
  prompt_profile: database_olap

version_rules:
  strategy: semver_loose
