site_name: LLM API Deep Research Hub
site_description: Automated deep-research reports on LLM API products
docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: deep purple
  features:
    - navigation.instant
    - navigation.tabs
    - content.code.annotate
    - content.tabs.link

plugins:
  - search
  - tags

markdown_extensions:
  - tables
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - attr_list
  - md_in_html

extra_css:
  - stylesheets/extra.css
