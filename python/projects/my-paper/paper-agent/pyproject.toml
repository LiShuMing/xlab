[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "paper-agent"
version = "0.1.0"
description = "A CLI tool for reading and analyzing academic papers"
requires-python = ">=3.11"
dependencies = [
    "typer>=0.12.0",
    "PyMuPDF>=1.24.0",
    "pydantic>=2.5.0",
    "anthropic>=0.34.0",
    "openai>=1.30.0",
    "faiss-cpu>=1.8.0",
    "rank-bm25>=0.2.2",
    "numpy>=1.26.0",
    "structlog>=24.1.0",
    "pyyaml>=6.0",
    "tenacity>=8.2.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=5.0.0",
]

[project.scripts]
paper-agent = "paper_agent.cli.main:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["paper_agent*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "slow: marks tests as slow (requires API keys)",
]
